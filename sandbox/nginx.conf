load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_waf_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx.pid;
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error.log info;

events {
    worker_connections  1024;
}

http {
    access_log  /mnt/nvme/imaginarium/openresty/sandbox/logs/access.log;

    # --- WAF edge firewall ---------------------------------------------
    waf               on;
    waf_bot_block     on;
    waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/scanners.list;

    # --- UA classification ($waf_type) lists ---------------------------
    waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/scanner-ua.list;
    waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/ai-crawler.list;
    waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/crawler.list;
    waf_bot_list         /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/bot.list;

    # --- geo / reputation ----------------------------------------------
    waf_geo_db        /mnt/nvme/imaginarium/openresty/geodb/location.db;
    waf_geo_block     CN RU;
    waf_flag_block    anycast;
    waf_trusted_proxy 127.0.0.1;

    server {
        listen       8080;
        listen       8443 ssl;
        listen       8443 quic reuseport;
        http2        on;
        server_name  localhost;

        ssl_certificate      /mnt/nvme/imaginarium/openresty/sandbox/certs/cert.pem;
        ssl_certificate_key  /mnt/nvme/imaginarium/openresty/sandbox/certs/key.pem;
        ssl_protocols        TLSv1.2 TLSv1.3;

        root   /mnt/nvme/imaginarium/openresty/sandbox/html;
        index  index.html;

        location / {
            add_header  Alt-Svc     'h3=":8443"; ma=86400';
            add_header  X-WAF-Type  $waf_type  always;
        }

        # Phase 2 demo: country whitelist (wins over the http{} geo_block).
        # Allowed country -> 200 (served from the static file); any other
        # country or unknown IP -> 404. A static file is used deliberately:
        # `return` runs in the REWRITE phase, before the WAF PREACCESS check,
        # so it would bypass reputation -- the content phase does not.
        location = /geo-whitelist {
            waf_geo_whitelist  HU DE;
        }
    }

    # --- SMTP auth_http endpoint (Phase 4) -----------------------------
    # Dedicated localhost-only server. waf off here disables the HTTP
    # PREACCESS handler so it cannot pre-empt the content handler on the
    # loopback peer; the auth_http content handler runs its own
    # reputation_check on the Client-IP header that ngx_mail supplies.
    server {
        listen       127.0.0.1:8081;
        server_name  waf-mail-auth;

        waf  off;

        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;   # dummy backend (allow path
                                                # not exercised in this test)
            waf_blocklist     127.0.0.1/32;     # reject the loopback test peer
            # waf_geo_db / waf_geo_block / waf_flag_block inherited from http{}
        }
    }
}

# ===================================================================
# Stream (L4) reputation head: the third head. Pure IP reputation at the
# STREAM ACCESS phase, no headers. Both demo servers proxy to the HTTP
# backend on 8080; the verdict is taken on the connection peer.
# ===================================================================
stream {
    waf_geo_db     /mnt/nvme/imaginarium/openresty/geodb/location.db;
    waf_flag_block anycast;

    # Blocked peer: the connection is dropped at the ACCESS phase.
    server {
        listen        9090;
        waf_stream    on;
        waf_blocklist 127.0.0.1/32;   # drop the loopback test peer
        proxy_pass    127.0.0.1:8080;
    }

    # Allowed peer: proxied straight through to the HTTP backend.
    server {
        listen        9091;
        waf_stream    on;
        waf_allowlist 127.0.0.1/32;   # allow the loopback test peer
        proxy_pass    127.0.0.1:8080;
    }
}

# ===================================================================
# Mail proxy: both heads of the edge firewall feed the same auth_http
# reputation endpoint. Sandbox uses high ports (2525 / 5870) because the
# test nginx runs unprivileged; production binds 25 / 587.
# ===================================================================
mail {
    auth_http                 127.0.0.1:8081/waf-mail-auth;
    proxy_pass_error_message  on;

    # Inbound MX: unauthenticated, pure IP reputation (Auth-Method: none).
    server {
        listen     2525;
        protocol   smtp;
        smtp_auth  none;
    }

    # Submission: STARTTLS + SMTP AUTH. Reputation still runs first, so a
    # blocked IP is rejected before any password is checked.
    server {
        listen               5870;
        protocol             smtp;
        smtp_auth            plain login;
        starttls             on;
        ssl_certificate      /mnt/nvme/imaginarium/openresty/sandbox/certs/cert.pem;
        ssl_certificate_key  /mnt/nvme/imaginarium/openresty/sandbox/certs/key.pem;
    }
}
