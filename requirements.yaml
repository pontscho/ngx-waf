original_request: |
  /p:task-plan docs/feature-implementation-plan.md
  Convert the completed feature-implementation-plan.md (WAF Module Feature Expansion:
  JA4, ASN block, method filter, detect mode, location.db cron, config docs) into a
  function-level requirements.yaml for /p:implement.

goal: |
  Extend the vanilla-nginx dynamic WAF module (modules/ngx_http_waf/) with six features
  over the existing shared reputation core + lock-free stats subsystem:
    1. JA4 TLS-fingerprint detection (observability-only, NO blocking; TCP-TLS + QUIC) -> $waf_ja4_hash.
    2. ASN-based blocking (waf_asn_block, HTTP+STREAM, WAF_REASON_ASN) -> $waf_asn.
    3. HTTP method filtering (waf_method_allow / waf_method_deny -> 404, WAF_REASON_METHOD).
    4. Detect mode: `waf off|detect|enforce` enum (+ `on` alias); detect bumps would_block[] + DECLINED.
    5. location.db daily refresh cron script (download -> verify -> atomic swap -> reload). No C code.
    6. README config-level usage docs (map-based blocking pattern). No module code.

complete: true

implementation_complete: true
implementation_date: "2026-06-13"
inspector_verdict: COMPLETE
inspector_iterations: 1
security_verdict: APPROVE
security_iterations: 1
implementation_notes: |
  GROUP A (detect mode, ASN block, method filter, would_block stats) + GROUP B
  (JA4) implemented and verified: full module builds clean under -Werror -W
  -Wall; 57/57 integration assertions pass (incl. live $waf_ja4_hash over TLS);
  6/6 JA4 unit tests pass incl. the FoxIO canonical vector bit-for-bit.
  Phase A impl-inspector: COMPLETE (17/17 in-scope items). Phase B security:
  APPROVE (0 surviving findings; the attacker-controlled JA4 parser bounds,
  OPENSSL_free leak discipline, and the handshake-cb NULL-guard were all
  verified correct against the nginx oracle).
  Deviations: task-017 (location.db cron script) DESCOPED by the user
  mid-implementation ("drop it for now") -> marked cancel; README documents the
  manual curl+xz DB refresh instead. task-013 reads $waf_ja4_hash directly from
  SSL ex-data (set by the client_hello callback) instead of caching in the
  request ctx -- the SSL connection is the cache; behavior identical.

requirements:
  - category: architecture
    question: "JA4 raw ClientHello access without patching nginx/OpenSSL?"
    answer: |
      Wrapper-chain (Option 5, partner-selected). The module installs its own client_hello_cb
      on each server SSL_CTX in postconfiguration; the wrapper computes JA4, stores it on the SSL*,
      then chains to the public ngx_ssl_client_hello_callback() so nginx SNI processing runs unchanged.
      Verified feasible: ngx_ssl_client_hello_callback non-static + header-declared (ngx_event_openssl.h:299,
      under #ifdef SSL_CLIENT_HELLO_SUCCESS), ngx_ssl_client_hello_arg_index extern (:410).
    details:
      - "Covers TCP-TLS (HTTP/1.1+H2) AND QUIC/H3 from one hook (cb fires on QUIC; no QUIC guard in OpenSSL tls_early_post_process_client_hello)."
      - "No nginx/OpenSSL source patching; no SNI reproduction."
      - "DRIFT: ngx_ssl_client_hello_callback is inside #ifdef SSL_CLIENT_HELLO_SUCCESS (ngx_event_openssl.h:298) -> JA4 hook code must be inside the same guard."
    options: ["OpenSSL patch", "nginx patch", "cb takeover + SNI repro", "msg_callback TCP-only", "wrapper-chain"]
    status: answered
  - category: architecture
    question: "JA4 string-assembly testing approach (no C unit infra exists in the module)?"
    answer: |
      Pure core + unit scaffold (partner-selected 2026-06-13). Split into:
        - ngx_http_waf_ja4_build(): PURE core on raw uint16 arrays (ciphers/exts/sigalgs) + ALPN bytes,
          stdint + OpenSSL SHA256 only, NO nginx types -> standalone-compilable & unit-testable.
        - ngx_http_waf_ja4_compute(SSL*, pool, out): thin SSL-extractor wrapper that calls the getters
          then ngx_http_waf_ja4_build().
      New tests/unit/ scaffold: vendor ctest.h (single-header, NOT present in repo), test-ja4.c includes
      waf_ja4.c under -DWAF_JA4_UNIT_TEST (nginx/SSL parts #ifdef'd out), run-unit-tests.sh compiles with
      `cc -DWAF_JA4_UNIT_TEST ... -lcrypto`. Asserts FoxIO canonical vector + GREASE + ALPN hex-fallback +
      empty-sigalg c-path + count-clamp. This also isolates the attacker-controlled parser for CWE-125/787/190/401.
    details:
      - "waf_ja4.c MUST wrap nginx includes + SSL wrapper + cb in `#ifndef WAF_JA4_UNIT_TEST` so the core compiles alone."
      - "Pure core uses standard snprintf/memcpy/qsort + OpenSSL SHA256 (NOT ngx_snprintf) to stay nginx-free."
      - "No ctest.h in repo -> task-012 vendors a single-header ctest.h into tests/unit/ (see p:ctest.h skill)."
    options: ["pure core + unit scaffold", "integration + Wireshark only"]
    status: answered
  - category: data
    question: "Reason-enum / counter-array growth strategy?"
    answer: |
      Append WAF_REASON_ASN, WAF_REASON_METHOD immediately BEFORE WAF_REASON_MAX (waf_rep.h:53) to keep
      existing indices stable. All reason-indexed arrays (http_blocked[], stream_denied[], vhost blocked[])
      and all 3 serializer loops are WAF_REASON_MAX-driven -> new reasons auto-render. JA4 adds NO reason
      (observability-only). Shm layout grows -> fresh zone on .so reload (stop+start), counters reset (documented).
    details:
      - "waf_reason_str[] (ngx_http_waf_module.c:43-53) must gain ngx_string(\"asn\"), ngx_string(\"method\") at indices 9,10."
      - "would_block[] arrays are NEW reason-indexed arrays needing EXPLICIT serializer rows (not auto)."
    options: []
    status: answered
  - category: interface
    question: "waf directive backward compatibility?"
    answer: |
      `waf` becomes ngx_conf_enum_t {off=0, detect=1, enforce=2, on=2(alias)}. enable(ngx_flag_t) -> mode(ngx_uint_t).
      Fail-CLOSED invariant (CWE-636): create-default=NGX_CONF_UNSET_UINT, merge default=WAF_MODE_ENFORCE.
      detect is the ONLY non-blocking value; any unexpected value takes the blocking path. `waf on` still enforces.
    details:
      - "ALL 7 conversion sites must change (4 HTTP + 3 STREAM) or it fails to compile / silently mis-gates."
      - "A missed conversion site MUST fail CLOSED (block), never observe-only."
    options: []
    status: answered
  - category: security
    question: "Method-block response code and policy disclosure?"
    answer: "Fixed 404 (consistent with scanner blocks, hides the method policy). No configurable action token."
    details: ["whitelist (waf_method_allow) wins, then blacklist (waf_method_deny) narrows."]
    options: ["403", "404", "405", "configurable"]
    status: answered
  - category: security
    question: "location.db cron supply-chain integrity?"
    answer: |
      MANDATORY (security review): magic-only validation is integrity-theater. Fetch over HTTPS with cert
      verification (fixed constant URL, never interpolated) AND verify IPFire's published signature (GPG detached
      sig OR pinned SHA256 from a separately-fetched signed manifest) BEFORE the swap. libloc magic/version is a
      sanity check, NOT the integrity control. TOCTOU-safe (CWE-367): temp file in target dir, verify-in-place,
      rename() same file, no re-download. Least privilege: non-root owner that can signal nginx master for reload.
    details:
      - "CWE-494/345 (download integrity), CWE-367 (TOCTOU), least-privilege."
      - "Implementation must confirm IPFire's actual signing mechanism for location.db (GPG sig vs SHA256 manifest)."
    options: []
    status: answered
  - category: implementation
    question: "JA4 string lifetime / ownership?"
    answer: |
      Option (b): allocate the JA4 string from the connection pool c->pool (reachable via
      SSL_get_ex_data(ssl, ngx_ssl_connection_index)), freed with the connection pool. No manual free,
      matches nginx allocation discipline; getter returns a pointer valid for the request lifetime.
      SSL_client_hello_get1_extensions_present() *out is the ONLY allocating getter -> OPENSSL_free on EVERY path (CWE-401).
    details: []
    options: ["OPENSSL_malloc + ex_data free-cb", "c->pool (connection-scoped)"]
    status: answered

constraints:
  - type: technical
    description: "Vanilla nginx 1.30.2 dynamic module; bundled OpenSSL 3.5.7 (system 3.0.2 too old for QUIC)."
    impact: "No nginx/OpenSSL source patching. QUIC features require the bundled OpenSSL."
  - type: technical
    description: "STREAM TU (waf_stream.c) includes ONLY waf_rep.h (ngx_core-only). Verified: includes ngx_config/ngx_core/ngx_stream/waf_rep.h."
    impact: "STREAM cannot see ngx_http_waf_stat_shm_t -> detect path pokes stream_would_block[] via opaque void* helper ngx_http_waf_stat_stream_would_block (mirrors ngx_http_waf_stat_stream_bump, waf_rep.h:120-121, def ngx_http_waf_module.c:377-390). JA4 + method are HTTP-only."
  - type: technical
    description: "Build: CMake super-build broken for modules (PATH bug). NGX=build/nginx_ext-prefix/src/nginx_ext."
    impact: "New .c/config -> re-run ./configure + `touch $SSL_H` (OpenSSL-rebuild trap) before `make -C $NGX modules` with PATH=/usr/bin:/bin. New .so -> nginx stop+start. All builds via p:minion-builder. No project-forge.yaml present. Docker strictly forbidden."
  - type: technical
    description: "No C unit-test infrastructure in the module (tests/ has only run-stat-tests.sh + waf-stat-test.conf); no ctest.h in repo; scripts/ dir does not exist."
    impact: "JA4 unit test = standalone cc build + vendored single-header ctest.h. scripts/ must be created for the cron script."
  - type: security
    description: "JA4 parser processes attacker-controlled ClientHello bytes."
    impact: "Bounds-safety MANDATORY: count clamp WAF_JA4_MAX_ELEMS (CWE-190), bounded heap/pool copy before sort with clamped count (CWE-787), fixed output buffer (36 bytes + NUL), every read bounded by getter-returned length (CWE-125), ALPN hex-fallback as injection-safety control (CWE-116/117), get1_extensions_present leak discipline (CWE-401), fail-open never crash."
  - type: technical
    description: "Wrapper cb NULL-deref hazard (inspector C2): nginx ngx_ssl_client_hello_callback unconditionally derefs cb->servername (ngx_event_openssl.c:2063) from SSL_CTX_get_ex_data(...,ngx_ssl_client_hello_arg_index) (:2025-2026)."
    impact: "Wrapper MUST: arg = SSL_CTX_get_ex_data(SSL_get_SSL_CTX(ssl_conn), ngx_ssl_client_hello_arg_index); if NULL -> return SSL_CLIENT_HELLO_SUCCESS (skip chain); else chain ngx_ssl_client_hello_callback(ssl_conn, ad, NULL). Install only where sscf->ssl.ctx!=NULL AND arg ex_data already set. WAF postconfig must run AFTER ngx_http_ssl_module merge (it does, add-dynamic-module load order)."

success_criteria:
  - "$waf_ja4_hash produces a correct FoxIO JA4 (a_b_c) for TCP-TLS, validated bit-for-bit against Wireshark for >=1 known client."
  - "$waf_ja4_hash produces a q...-prefixed JA4 for HTTP/3 (QUIC) — empirical confirmation the wrapped cb fires on QUIC."
  - "SNI virtual hosts + certificate selection keep working after the JA4 wrapper is installed (no regression)."
  - "waf_asn_block 64500 64501; blocks requests/connections resolving to those ASNs; non-listed and asn==0 pass."
  - "$waf_asn shows the source ASN in the access log."
  - "waf_method_allow GET POST HEAD; returns 404 for any other method; waf_method_deny TRACE TRACK; returns 404 for those two."
  - "waf detect; lets all requests through (NGX_DECLINED) while would_block[reason] increments exactly as enforce-mode blocked counters would."
  - "waf on; still parses and behaves as enforce (backward compatibility)."
  - "Stats endpoints (plain/json/prometheus) expose the new asn/method reasons and the would_block counters."
  - "JA4 unit test asserts the FoxIO canonical vector t13d1516h2_8daaf6152771_e5627efa2ab1 (pure-core build fn)."
  - "The cron script atomically replaces location.db only after HTTPS+signature validation, and reloads nginx."
  - "Build clean under -Werror -W -Wall; curl integration harness passes (existing + new assertions); JA4 unit test passes."

context_summary:
  error_handling: |
    Internal fns return ngx_int_t NGX_OK/NGX_ERROR; config handlers return NGX_CONF_OK/NGX_CONF_ERROR.
    reputation_check NULL-guards `out` on every branch. JA4 + ASN are FAIL-OPEN (asn==0 -> pass; JA4
    compute failure -> still chain to nginx cb + return SSL_CLIENT_HELLO_SUCCESS, never break handshake).
    Method filter only acts when its directive is configured.
  memory_management: |
    Config arrays from cf->pool (reload-safe); lazy ngx_array_create (8 elems, sizeof(uint16_t)).
    Per-connection JA4 string from c->pool (via SSL_get_ex_data(ssl, ngx_ssl_connection_index)), freed with conn.
    SSL_client_hello_get1_extensions_present() *out is the ONLY allocating getter -> OPENSSL_free on EVERY path
    (single goto cleanup). Sort scratch = heap/pool copy sized clamped_count*sizeof(uint16_t), freed on every path.
  logging_pattern: "ngx_log_error(NGX_LOG_INFO/NGX_LOG_WARN/NGX_LOG_ERR, log, 0, fmt, ...); block events at INFO."
  naming_conventions: |
    ngx_http_waf_ prefix, snake_case functions, UPPER_CASE macros/enums. WAF_REASON_* enum, WAF_MODE_* macros.
    Reason tokens are lowercase strings in waf_reason_str[] (e.g. "asn", "method"). uint16_t packing for cc codes.
  key_patterns:
    - "Reason-indexed arrays are [WAF_REASON_MAX]; all 3 serializers loop `for (i=WAF_REASON_NONE+1; i<WAF_REASON_MAX; i++)` -> new reasons auto-render; would_block[] needs EXPLICIT rows."
    - "Directive set-handlers iterate cf->args->elts[1..nelts), call an array-add helper writing to wlcf->rep.<arr> (see ngx_http_waf_set_geo_block + ngx_http_waf_country_add)."
    - "Lazy variable getters: get-or-alloc ctx; do work once behind a *_done bit; cache; set v->valid/no_cacheable/not_found (see ngx_http_waf_country_variable:1088)."
    - "STREAM TU sees ONLY waf_rep.h; pokes shm via opaque void* helpers (ngx_http_waf_stat_stream_bump pattern)."
    - "mode refactor: hit ALL 7 sites; create-default=NGX_CONF_UNSET_UINT, merge=ngx_conf_merge_uint_value(...,WAF_MODE_ENFORCE); a missed site MUST fail CLOSED."
    - "JA4 hook code inside #ifdef SSL_CLIENT_HELLO_SUCCESS; wrapper NULL-guards cb arg ex_data before chaining."
    - "GREASE filter: (v & 0x0f0f) == 0x0a0a -> drop from ciphers/exts/sigalgs (count + hash)."

