# ngx_http_waf_module - work-stream C committed-fixture regression config
#
# Live-fire regression net (threat-model docs/threat-model.md §6 C; plan
# docs/honeypot-C-plan.md). Where work-stream B *measured* coverage in detect
# mode, C *asserts* it in ENFORCE mode against a frozen, committed fixture: if a
# future scanners.list / args.list / header-list edit stops matching /.env or
# wp-login.php, the harness fails with the exact divergence.
#
# Per dimension there are TWO vhosts -- a DETECT vhost (waf detect, used by the
# freeze generator to read the authoritative X-WAF-Reason) and an ENFORCE vhost
# (waf on, used by both the freeze generator and the regression harness to read
# the real HTTP status: 404 / 403 / 444). Each vhost enables EXACTLY ONE matcher
# dimension, because PREACCESS is first-match-wins: an earlier dimension would
# otherwise mask a later one and blur the frozen verdict's attribution.
#
# Security invariants (inherited verbatim from waf-replay-test.conf:9-18,
# security-officer guardrail #4):
#   - ZERO proxy_pass in ANY vhost: every location is static-file backed, so a
#     replayed hostile request can never be relayed off-box. A WAF-declined
#     request reaches CONTENT and is served 200 / static-404 (proving non-block);
#     a WAF block is 404 / 403 / 444. run-regression-tests.sh asserts the
#     zero-proxy_pass invariant on this file so no future edit introduces egress.
#   - All listeners bind 127.0.0.1 ONLY.
#   - NO waf_trusted_proxy: XFF is not honoured, the canonical client IP stays
#     the loopback peer -- the fake-bot dimension depends on this.
#   - NO waf_geo_db: geo is not exercised, so no load-time verify cost.
#   - NO waf_rate_zone / waf_rate_limit: this is the PRIMARY reason this config
#     does NOT reuse the stat-conf 28080 block -- a shared rate bucket would make
#     a 35k-vector enforce sweep non-deterministic (429s mid-replay). Here, the
#     only verdicts are the matcher under test.
#
# waf_reason_header is on GLOBALLY (detect AND enforce): the harness reads the
# live (reason,status) tuple from each enforce response for non-444 vectors. On
# a 444 (NGX_HTTP_CLOSE, zero response bytes) no header reaches the wire, so the
# fixture's freeze-time expected_reason stands and the assert is status-only.
#
# Port map (283xx, all free): reg-status 28300; path 28301/28302;
# args 28303/28304; ua 28305/28306; referer 28307/28308; cookie 28309/28310;
# fakebot 28311/28312. NOTE [M2]: run-stat-tests.sh binds two INLINE neg-test
# confs on 28097 and 28099 -- they do NOT collide with 283xx, but are flagged
# here against future reuse of those ports.
#
# Self-contained: high test ports + its own pid/log files. Drive it with
# tests/run-regression-tests.sh.

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_waf_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-regression.pid;
# error level only: an enforce sweep of ~35k vectors would flood info/notice.
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-regression.log error;

events {
    worker_connections  1024;
}

http {
    # no access_log: ~35k loopback requests need not hit disk (and it keeps the
    # loopback peers off disk on principle, mirroring the B harness).
    access_log  off;

    # bot-block OFF by default so empty/scanner UA never masks a non-UA dimension;
    # only the ua + fakebot vhosts turn the relevant switches back on.
    waf_bot_block      off;
    # stamp X-WAF-Reason on every response (detect AND enforce). The freeze
    # generator reads it from the detect vhost for the authoritative reason; the
    # harness reads it from the enforce vhost to assert the (reason,status) tuple
    # for non-444 vectors. Defaults OFF in production; the test harness turns it on.
    waf_reason_header  on;

    # the freeze generator's DETECT pass reuses one keep-alive connection per
    # dimension; allow effectively unlimited requests on it. (The ENFORCE pass
    # and the harness use Connection: close -- one socket per vector -- so this
    # only matters for the detect pass.)
    keepalive_requests  1000000;
    keepalive_timeout   75s;

    # === reg-status: waf off so its own queries are never counted ===========
    # FP-gate counter source; waf off means this vhost never classifies.
    server {
        listen       127.0.0.1:28300;
        server_name  reg-status;
        waf  off;
        location /waf/stat { waf_status; }
    }

    # === path: scanner-path matcher ONLY ====================================
    server {
        listen       127.0.0.1:28301;
        server_name  reg-path-detect;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               detect;
        waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/scanners.list;
        location / { }
    }
    server {
        listen       127.0.0.1:28302;
        server_name  reg-path-enforce;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/scanners.list;
        location / { }
    }

    # === args: query-arg signature matcher ONLY =============================
    server {
        listen       127.0.0.1:28303;
        server_name  reg-args-detect;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf            detect;
        waf_args_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/args.list;
        location / { }
    }
    server {
        listen       127.0.0.1:28304;
        server_name  reg-args-enforce;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf            on;
        waf_args_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/args.list;
        location / { }
    }

    # === ua: UA classifiers + bot-block ON ==================================
    # The signal lands in would_block/blocked[scanner_ua] / [empty_ua], never
    # scanner_path: UA fixtures are fed on path '/'.
    server {
        listen       127.0.0.1:28305;
        server_name  reg-ua-detect;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf                  detect;
        waf_bot_block        on;
        waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/scanner-ua.list;
        waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/ai-crawler.list;
        waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/crawler.list;
        waf_bot_list         /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/bot.list;
        location / { }
    }
    server {
        listen       127.0.0.1:28306;
        server_name  reg-ua-enforce;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf                  on;
        waf_bot_block        on;
        waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/scanner-ua.list;
        waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/ai-crawler.list;
        waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/crawler.list;
        waf_bot_list         /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/bot.list;
        location / { }
    }

    # === referer: Referer signature matcher ONLY ============================
    server {
        listen       127.0.0.1:28307;
        server_name  reg-referer-detect;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               detect;
        waf_referer_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/referer.list;
        location / { }
    }
    server {
        listen       127.0.0.1:28308;
        server_name  reg-referer-enforce;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_referer_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/referer.list;
        location / { }
    }

    # === cookie: Cookie signature matcher ONLY ==============================
    server {
        listen       127.0.0.1:28309;
        server_name  reg-cookie-detect;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf              detect;
        waf_cookie_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/cookie.list;
        location / { }
    }
    server {
        listen       127.0.0.1:28310;
        server_name  reg-cookie-enforce;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf              on;
        waf_cookie_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/cookie.list;
        location / { }
    }

    # === fakebot: CIDR-verified crawler / ai_crawler ========================
    # [M3] The UA must FIRST classify as crawler / ai_crawler (hence both
    # classifier lists), then the verified-CIDR list -- which EXCLUDES loopback
    # -- makes a crawler UA from 127.0.0.1 a fake bot. Both verified_bot tokens
    # use the underscore form 'ai_crawler' ([M4]; the hyphen form is only the
    # $waf_type variable namespace, never a directive token). Verbatim from
    # waf-replay-test.conf:106-117.
    server {
        listen       127.0.0.1:28311;
        server_name  reg-fakebot-detect;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf                  detect;
        waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/crawler.list;
        waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/ai-crawler.list;
        waf_fake_bot_block   on;
        waf_verified_bot     crawler    /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/verified-crawler.list;
        waf_verified_bot     ai_crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/verified-crawler.list;
        location / { }
    }
    server {
        listen       127.0.0.1:28312;
        server_name  reg-fakebot-enforce;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf                  on;
        waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/crawler.list;
        waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/ai-crawler.list;
        waf_fake_bot_block   on;
        waf_verified_bot     crawler    /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/verified-crawler.list;
        waf_verified_bot     ai_crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_waf/lists/verified-crawler.list;
        location / { }
    }
}
