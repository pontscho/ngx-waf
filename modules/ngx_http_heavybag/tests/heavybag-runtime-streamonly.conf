# ngx_http_heavybag_module - Phase 7c stream-ONLY startup config (sharedmem-01)
#
# A deliberately HTTP-less config: only stream{} uses the WAF. Before the
# sharedmem-01 fix, the stream postconfig pushed a size-0 "waf_status" shm stub
# while the HTTP postconfig (which sets the real size) never ran -> nginx's
# zero-size shared-memory guard aborted startup fatally for this documented-valid
# shape. The fix resolves waf_status by walking cycle->shared_memory in
# init_module (order-independent, tolerates NULL when no HTTP head registered it),
# so a stream-only deployment now starts clean and the stream stat path NULL-guards.
#
# Driven by tests/run-runtime-tests.sh (Part C1). Self-contained: 286xx ports,
# own pid/log. proxy_pass targets a closed loopback port (127.0.0.1:1) -- the WAF
# preread/access decision runs BEFORE the proxy connects, so no upstream is needed
# and nothing egresses off-box.

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-runtime-stream.pid;
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-runtime-stream.log info;

events {
    worker_connections  1024;
}

# NO http{} block at all -- this is the whole point of the test.
stream {
    server {
        listen       127.0.0.1:28610;
        waf_stream   on;
        waf_blocklist 198.51.100.0/24;   # plain CIDR, no geo_db needed
        proxy_pass   127.0.0.1:1;         # closed port; WAF decision precedes connect
    }
}
