# ngx_http_heavybag_module - reputation verdict-precedence deep-fuzz config
#
# The QA-campaign critic's "un-probed reputation verdict-precedence" surface.
# reputation_check() (heavybag_reputation.c) is a strict first-match-wins,
# early-return pipeline. Every existing reputation test is single-source
# (blocklist OR geo OR asn, never colliding). This harness builds COLLISIONS --
# IPs that match MULTIPLE sources at once -- and asserts the documented order:
#
#   allowlist > blocklist > [geo-not-found whitelist] > flag(bit) > ASN
#            > flag_cc > allow_cc-whitelist > block_cc
#   (heavybag_reputation.c:50/61/98/109/126/148/170/182)
#
# A collision result only PROVES ordering if both colliding sources would each
# fire alone -- so every collision is backed by single-source CONTROLS that
# show the lower-priority source DOES match the same IP.
#
# Tested on the HTTP PREACCESS path (waf_trusted_proxy + spoofed XFF inject the
# client IP; X-WAF-Reason exposes ctx->reason). reputation_check is shared
# verbatim by the mail + stream heads, so HTTP coverage is authoritative.
#
# Drive it with tests/run-reputation-precedence.sh.
#
# Security invariants: ZERO proxy_pass (runner asserts); listeners bind
# 127.0.0.1 only; XFF honoured only from the loopback trusted proxy.
#
# Ground-truth IPs (validated at runtime by reference/geolookup.c):
#   185.177.72.1  -> FR, AS211590, flags 0x0000  (geo+asn, NO flag bit)
#   8.8.8.8       -> US, AS15169,  flags 0x0004  (anycast: flag+asn+geo)
#   185.220.101.1 -> DE, AS60729,  flags 0x0001  (anonymous-proxy: flag+asn+geo)
#
# Each location is backed by a real $document_root/p-<name> file (created by the
# runner) so an ALLOWED request is served in place (no try_files internal
# redirect that would clear ctx->reason); X-WAF-Reason is then readable on the
# wire for allowed verdicts too.
#
# Port: 28701 (precedence; distinct from mailauth 286xx / protocol 285xx).

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-repprec.pid;
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-repprec.log info;

events {
    worker_connections  1024;
}

http {
    access_log  off;
    default_type  text/plain;

    server {
        listen       127.0.0.1:28701;
        server_name  repprec;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;

        waf                on;
        waf_reason_header   on;                 # expose ctx->reason as X-WAF-Reason
        waf_trusted_proxy   127.0.0.1;          # honour XFF from the test driver
        waf_geo_db          /mnt/nvme/imaginarium/openresty/geodb/location.db;
        waf_bot_block       off;                # no UA dimension here

        # ---- baseline: the probe IP is not blocked by any default rule -------
        location = /p-base  { }

        # ---- single-source CONTROLS: each source must fire ALONE -------------
        # geo block fires:
        location = /p-cg    { waf_geo_block  US; }              # 8.8.8.8 -> geo
        location = /p-cg2   { waf_geo_block  FR; }              # 185.177.72.1 -> geo
        # asn block fires:
        location = /p-ca    { waf_asn_block  15169; }          # 8.8.8.8 -> asn
        location = /p-ca2   { waf_asn_block  211590; }         # 185.177.72.1 -> asn
        location = /p-ca3   { waf_asn_block  60729; }          # 185.220.101.1 -> asn
        # flag block fires (two distinct bits):
        location = /p-cf    { waf_flag_block anycast; }        # 8.8.8.8 -> flag
        location = /p-cf2   { waf_flag_block anonymous-proxy; } # 185.220.101.1 -> flag

        # ---- COLLISIONS: prove the higher-priority source wins ---------------
        # R1 allowlist > blocklist (same IP on both lists -> allowed)
        location = /p-r1 {
            waf_allowlist  185.177.72.1/32;
            waf_blocklist  185.177.72.1/32;
        }
        # R2 blocklist > flag + asn + geo (all four match 8.8.8.8 -> blocklist)
        location = /p-r2 {
            waf_blocklist   8.8.8.8/32;
            waf_flag_block  anycast;
            waf_asn_block   15169;
            waf_geo_block   US;
        }
        # R3 flag > asn (8.8.8.8 is anycast AND AS15169 -> flag)
        location = /p-r3 {
            waf_flag_block  anycast;
            waf_asn_block   15169;
        }
        # R4 flag > block_cc (8.8.8.8 is anycast AND US -> flag)
        location = /p-r4 {
            waf_flag_block  anycast;
            waf_geo_block   US;
        }
        # R5 asn > block_cc (185.177.72.1 is AS211590 AND FR, no flag -> asn)
        location = /p-r5 {
            waf_asn_block   211590;
            waf_geo_block   FR;
        }
        # R6a geo-whitelist control: US is found but not whitelisted -> 404
        location = /p-r6a { waf_geo_whitelist HU; }
        # R6b blocklist > geo-whitelist (8.8.8.8 blocklisted AND not-HU -> blocklist)
        location = /p-r6b {
            waf_blocklist     8.8.8.8/32;
            waf_geo_whitelist HU;
        }
        # R8 flag(anonymous-proxy) > asn (185.220.101.1 is anon-proxy AND AS60729)
        location = /p-r8 {
            waf_flag_block  anonymous-proxy;
            waf_asn_block   60729;
        }
    }
}
