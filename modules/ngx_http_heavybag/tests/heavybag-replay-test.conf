# ngx_http_heavybag_module - work-stream B detect-mode replay config
#
# Dimension-clean replay harness target (threat-model docs/threat-model.md §6 B;
# plan docs/honeypot-B-plan.md §2). Every matcher dimension gets its OWN vhost
# with EXACTLY ONE matcher enabled, so the would_block[reason] counter read off
# the status endpoint attributes cleanly to that dimension -- PREACCESS is
# first-match-wins, so an earlier dimension would otherwise mask a later one.
#
# Security invariants (security-officer S1/S5):
#   - NO proxy_pass in any HTTP vhost: every location is static-file backed, so
#     a replayed request can never be relayed off-box. A declined request
#     reaches the CONTENT phase and is served 200 (proves detect let it pass).
#   - All listeners bind 127.0.0.1 only.
#   - NO waf_trusted_proxy: XFF is not honoured, the canonical client IP stays
#     the loopback peer -- the fake-bot dimension depends on this.
#   - NO waf_geo_db / waf_rate_zone: geo and rate are not exercised here, so the
#     replay never pays the geo verify cost and no rate bucket interferes.
#
# Self-contained: high test ports (281xx) + its own pid/log files. Drive it
# with tests/run-replay-tests.sh.

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-replay.pid;
# error level only: a detect-mode sweep of ~85k vectors would flood info/notice.
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-replay.log error;

events {
    worker_connections  1024;
}

http {
    # no access_log: ~85k loopback requests need not be written to disk (and it
    # keeps client peers -- all loopback here -- off disk on principle).
    access_log  off;

    # detect EVERYWHERE (the status vhost overrides to off); measure, never block.
    waf            detect;
    # bot-block OFF by default so empty/scanner UA never masks a non-UA dimension;
    # ONLY replay-ua turns it back on. (plan §2: dimension isolation.)
    waf_bot_block  off;
    # stamp X-WAF-Reason: $waf_reason on every response so the replay client reads
    # each request's verdict on the wire ("none" = declined/uncovered, any token =
    # would-block) -- per-vector attribution while staying in detect mode. The
    # directive defaults OFF in production; this is the test harness turning it on.
    waf_reason_header  on;

    # the replay client reuses one keep-alive connection per dimension for the
    # whole sweep; allow effectively unlimited requests on it (§9 cardinality).
    keepalive_requests  1000000;
    keepalive_timeout   75s;

    # --- replay-path: scanner-path matcher ONLY --------------------------
    server {
        listen       127.0.0.1:28182;
        server_name  replay-path;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        location / { }
    }

    # --- replay-args: query-arg signature matcher ONLY -------------------
    server {
        listen       127.0.0.1:28183;
        server_name  replay-args;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf_args_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/args.list;
        location / { }
    }

    # --- replay-ua: UA classifiers + bot-block ON ------------------------
    # The ONLY vhost with bot_block on. Fed UA fixtures on path '/' so the
    # signal lands in would_block[scanner_ua] / [empty_ua], never scanner_path.
    server {
        listen       127.0.0.1:28184;
        server_name  replay-ua;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf_bot_block        on;
        waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanner-ua.list;
        waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/ai-crawler.list;
        waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/crawler.list;
        waf_bot_list         /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/bot.list;
        location / { }
    }

    # --- replay-referer: Referer signature matcher ONLY ------------------
    server {
        listen       127.0.0.1:28185;
        server_name  replay-referer;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf_referer_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/referer.list;
        location / { }
    }

    # --- replay-fakebot: CIDR-verified crawler / ai_crawler --------------
    # Needs the crawler classifiers loaded so the UA classifies, plus a
    # verified-CIDR list that EXCLUDES loopback (RFC 5737 doc ranges): a
    # crawler/ai_crawler UA from 127.0.0.1 is therefore a fake bot.
    # bot_block stays off (crawlers are flag-only anyway); fake_bot_block is
    # the matcher under test. Both positively-verifiable classes are covered.
    server {
        listen       127.0.0.1:28186;
        server_name  replay-fakebot;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/crawler.list;
        waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/ai-crawler.list;
        waf_fake_bot_block   on;
        waf_verified_bot     crawler    /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler.list;
        waf_verified_bot     ai_crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler.list;
        location / { }
    }

    # --- replay-cookie: Cookie signature matcher ONLY --------------------
    server {
        listen       127.0.0.1:28187;
        server_name  replay-cookie;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf_cookie_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/cookie.list;
        location / { }
    }

    # --- status: waf off so its own queries are never counted ------------
    server {
        listen       127.0.0.1:28190;
        server_name  status;
        waf  off;
        location /waf/stat { waf_status; }
    }
}
