# ngx_http_heavybag_module - Phase 7c reload-storm config (shm reuse by signature)
#
# Exercises live-reload coherence: the WAF shared-memory zones (waf_status counters
# + waf_rate token buckets) must be REUSED across SIGHUP reloads (nginx matches a
# zone by name + tag + size/layout signature), so counters PERSIST and the worker
# re-attaches cleanly -- never "[emerg] ... not binary compatible", never a reset
# to zero, never a crash. The stream head's waf_stream_rate_limit shares the same
# waf_rate zone the http{} head declares, so reload also re-resolves that link.
#
# Driven by tests/run-runtime-tests.sh (Part C2). Self-contained: 286xx ports.
# Status vhost runs `waf off` so its own scrapes never self-count.

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-runtime-reload.pid;
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-runtime-reload.log info;

events {
    worker_connections  1024;
}

http {
    access_log  off;
    default_type  text/plain;

    waf_rate_zone  size=1m;          # the shm zone that must survive reload

    # === status: waf off so its own queries are never counted ===============
    server {
        listen       127.0.0.1:28611;
        server_name  rt-status;
        waf  off;
        location /waf/stat { waf_status; }
    }

    # === workload vhost: scanner + rate limit, counters bump here ============
    server {
        listen       127.0.0.1:28612;
        server_name  rt-work;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf               on;
        waf_scanner_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
        location / { waf_rate_limit rate=1000r/s burst=2000; }
    }
}

stream {
    server {
        listen       127.0.0.1:28613;
        waf_stream   on;
        waf_stream_rate_limit  rate=1000r/s;   # shares the http waf_rate zone
        proxy_pass   127.0.0.1:1;
    }
}
