# ngx_http_heavybag_module - waf_status integration test config
#
# Self-contained, uses high test ports (18xxx http, 19xxx stream) and its own
# pid/log files so it never clashes with the demo nginx.conf. Exercises every
# HTTP verdict class, the STREAM block path, the SMTP-auth (out==NULL) path,
# the per-vhost slots and output escaping (a server_name with " and \).

load_module /mnt/nvme/imaginarium/openresty/sandbox/modules/ngx_http_heavybag_module.so;

worker_processes  1;
pid               /mnt/nvme/imaginarium/openresty/sandbox/logs/nginx-stat.pid;
error_log         /mnt/nvme/imaginarium/openresty/sandbox/logs/error-stat.log info;

events {
    worker_connections  1024;
}

http {
    log_format  waftest  '$remote_addr type=$waf_type country=$waf_country '
                         'reason=$waf_reason';
    access_log  /mnt/nvme/imaginarium/openresty/sandbox/logs/access-stat.log waftest;

    # --- WAF edge firewall (global) ------------------------------------
    waf               on;
    waf_bot_block     on;
    waf_scanner_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanners.list;
    waf_scanner_ua_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/scanner-ua.list;
    waf_ai_crawler_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/ai-crawler.list;
    waf_crawler_list     /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/crawler.list;
    waf_bot_list         /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/bot.list;
    waf_geo_db        /mnt/nvme/imaginarium/openresty/geodb/location.db;

    # per-IP token-bucket rate-limit zone (HTTP-owned, shared with the stream
    # head). Keyed by client IP only -> one bucket per IP across ALL locations
    # and across L4 (the stream head), an intentional unified per-IP budget.
    waf_rate_zone     size=1m;

    # vhost A: the primary target for verdict triggers
    server {
        listen       127.0.0.1:28080;
        server_name  primary.test;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;

        location / { }

        # loopback is not found in geo -> whitelist mode hides it (404)
        location = /geo-whitelist { waf_geo_whitelist HU DE; }

        # force a static-blocklist 403 on the loopback test peer
        location = /blocked { waf_blocklist 127.0.0.1/32; }

        # method whitelist: only GET/HEAD pass; anything else -> 404. A static
        # file backs the location so an allowed GET reaches the CONTENT phase
        # (a `return` would fire in the REWRITE phase, before the WAF runs).
        location = /method-allow { waf_method_allow GET HEAD; }

        # method blacklist: DELETE (standard bit) + the non-standard TRACK -> 404;
        # GET passes. TRACE is listed too, but nginx core 405s TRACE before the
        # WAF phase ever runs, so DELETE exercises the live bitmask path instead.
        location = /method-deny  { waf_method_deny TRACE TRACK DELETE; }

        # ASN block: config-parse coverage only. The loopback test peer has no
        # ASN in the geo DB, so this never fires live (documented skip); the
        # asn reason still renders in every stats format at value 0.
        location = /asn-block { waf_asn_block 64500 64501; }

        # request-field signatures: args/cookie/referer action-bucketed lists.
        # A static file backs the location so a non-matching GET reaches the
        # CONTENT phase (200), proving the WAF declined rather than blocked.
        location = /sig {
            waf_args_list    /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/args.list;
            waf_cookie_list  /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/cookie.list;
            waf_referer_list /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/referer.list;
        }

        # --- fake-bot (CIDR-verified crawler) ------------------------------
        # "Googlebot" classifies as $waf_type=crawler (global waf_crawler_list).
        # No waf_trusted_proxy is set, so XFF is NOT honoured and the canonical
        # client IP is the loopback peer (127.0.0.1). The published range below
        # excludes loopback, so the claimed crawler is a fake bot. Static files
        # back each location so a declined request reaches CONTENT (200).

        # crawler UA, loopback OUT of published range -> 403
        location = /fakebot {
            waf_fake_bot_block on;
            waf_verified_bot   crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler.list;
        }

        # crawler UA, loopback IN range -> verified, served (200)
        location = /fakebot-ok {
            waf_fake_bot_block on;
            waf_verified_bot   crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler-local.list;
        }

        # switch on but no list configured for the class -> skipped (200)
        location = /fakebot-skip {
            waf_fake_bot_block on;
        }

        # list present but switch off -> not enforced (200)
        location = /fakebot-off {
            waf_fake_bot_block off;
            waf_verified_bot   crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler.list;
        }

        # --- per-IP rate limit (token bucket) ------------------------------
        # burst=3 -> the loopback peer gets 3 allowed then 429 (refill at
        # 5r/m is negligible on the ms test scale). A static file backs the
        # location so an allowed GET reaches CONTENT (200).
        location = /rate { waf_rate_limit rate=5r/m burst=3; }

        # for_geo coverage: a default rule plus a country-scoped override. The
        # loopback peer has NO geo record, so rule selection MUST fall to the
        # default (the HU rule never applies) -- this also proves for_geo parses.
        location = /rate-geo {
            waf_rate_limit rate=5r/m   burst=2;
            waf_rate_limit rate=100r/s burst=100 for_geo=HU;
        }
    }

    # vhost C: detect mode -- observes verdicts (would_block[]) but never blocks
    server {
        listen       127.0.0.1:28082;
        server_name  detect.test;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        index        index.html;
        waf  detect;
        waf_reason_header on;   # expose $waf_reason as X-WAF-Reason on responses

        location / { }

        # denied method under detect -> request passes (200), would_block[method]++.
        # Deny GET specifically so the passed-through request is a GET the static
        # handler serves with 200 (proving detect let it through, not blocked).
        location = /method-detect { waf_method_deny GET; }

        # args signature under detect -> request passes (200), would_block[args]++
        location = /sig-detect {
            waf_args_list /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/args.list;
        }

        # fake-bot under detect -> request passes (200), would_block[fake_bot]++
        location = /fakebot-detect {
            waf_fake_bot_block on;
            waf_verified_bot   crawler /mnt/nvme/imaginarium/openresty/modules/ngx_http_heavybag/lists/verified-crawler.list;
        }

        # rate limit under detect -> request passes (200), would_block[rate_limit]++
        # (the burst test above drains the shared loopback bucket first)
        location = /rate-detect { waf_rate_limit rate=5r/m burst=2; }
    }

    # vhost B: server_name carries " and \ to exercise output escaping.
    # It need not receive traffic - its name is rendered in the per-vhost
    # metrics regardless, which is exactly what the escaping test checks.
    server {
        listen       127.0.0.1:28080;
        server_name  'evil"name\back';
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;
        location / { }
    }

    # TLS vhost: the JA4 wrapper callback fires at handshake and stashes the
    # fingerprint on the connection; $waf_ja4_hash surfaces it for the test.
    server {
        listen       127.0.0.1:28443 ssl;
        server_name  ja4.test;
        ssl_certificate      /mnt/nvme/imaginarium/openresty/sandbox/certs/cert.pem;
        ssl_certificate_key  /mnt/nvme/imaginarium/openresty/sandbox/certs/key.pem;
        root         /mnt/nvme/imaginarium/openresty/sandbox/html;

        location = /ja4 {
            add_header  X-WAF-JA4 $waf_ja4_hash always;
            return 200 "ja4\n";
        }
    }

    # status endpoint: waf off so its own queries are never counted.
    server {
        listen       127.0.0.1:28090;
        server_name  status.test;
        waf  off;
        location /waf/stat { waf_status; }
    }

    # SMTP auth_http endpoint: drives reputation_check with out==NULL.
    server {
        listen       127.0.0.1:28081;
        server_name  mailauth.test;
        waf  off;
        location = /waf-mail-auth {
            waf_mail_auth;
            waf_mail_backend  127.0.0.1 2526;
            waf_blocklist     10.0.0.0/8;   # blocks the injected Client-IP
            waf_rate_limit    rate=5r/m burst=2;  # per-Client-IP rate limit
        }
    }
}

stream {
    waf_geo_db  /mnt/nvme/imaginarium/openresty/geodb/location.db;

    # blocked peer -> connection dropped at ACCESS, stream_denied[blocklist]++
    server {
        listen        127.0.0.1:29090;
        waf_stream    on;
        waf_blocklist 127.0.0.1/32;
        proxy_pass    127.0.0.1:28080;
    }

    # allowed peer -> proxied through, stream_allowed++
    server {
        listen        127.0.0.1:29091;
        waf_stream    on;
        waf_allowlist 127.0.0.1/32;
        proxy_pass    127.0.0.1:28080;
    }

    # detect mode -> would-deny peer is allowed through, stream_would_block++
    server {
        listen        127.0.0.1:29092;
        waf_stream    detect;
        waf_blocklist 127.0.0.1/32;
        proxy_pass    127.0.0.1:28080;
    }

    # per-IP rate limit at L4: burst=2. The loopback bucket is SHARED with the
    # HTTP rate locations (one global per-IP zone), so connections over the
    # shared budget are closed -> stream_denied[rate_limit]++.
    server {
        listen        127.0.0.1:29093;
        waf_stream    on;
        waf_stream_rate_limit rate=5r/m burst=2;
        proxy_pass    127.0.0.1:28080;
    }
}
